name: YouTube View Bot

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium

      - name: Create .env file
        run: |
          echo "YOUTUBE_EMAIL=${{ secrets.YOUTUBE_EMAIL }}" >> .env
          echo "YOUTUBE_PASSWORD=${{ secrets.YOUTUBE_PASSWORD }}" >> .env
          echo "PROXY=${{ secrets.PROXY }}" >> .env

      - name: Run YouTube View Bot
        run: python main.py
